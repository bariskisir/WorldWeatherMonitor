<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WorldWeatherMonitor — Interactive world weather map with live weather on major cities. Click countries to explore cities and see detailed forecasts with animations."
    />
    <title>WorldWeatherMonitor</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <div id="map"></div>
    <canvas id="map-weather-canvas" class="map-overlay-canvas"></canvas>
    <div class="loading-bar" id="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="api-error-toast" id="api-error-toast">
      API Rate Limit Exceeded. Please try again later.
    </div>
    <div id="search-hover-trigger"></div>
    <div class="search-container">
      <div class="settings-trigger" id="settings-btn">⚙️</div>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Search..."
          autocomplete="off"
        />
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="settings-overlay" id="settings-overlay">
      <div class="settings-modal" id="settings-modal">
        <div class="settings-header">
          <h2 class="settings-title">⚙️ App Settings</h2>
          <div class="settings-close" id="settings-close">✕</div>
        </div>
        <div class="settings-body">
          <div class="setting-group">
            <label class="setting-label">Temperature Unit</label>
            <div class="setting-control">
              <label class="radio-label"
                ><input type="radio" name="tempUnit" value="C" /> Celsius
                (°C)</label
              >
              <label class="radio-label"
                ><input type="radio" name="tempUnit" value="F" /> Fahrenheit
                (°F)</label
              >
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Max Visible Markers</label>
            <div class="setting-control">
              <input
                type="number"
                id="setting-boxCount"
                min="5"
                max="100"
                class="settings-input"
              />
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Cache Duration (Mins)</label>
            <div class="setting-control">
              <input
                type="number"
                id="setting-cacheDuration"
                min="1"
                max="60"
                class="settings-input"
              />
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Weather Animations</label>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-animations" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Marker Size</label>
            <select id="setting-boxSize" class="settings-select">
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
            </select>
          </div>
        </div>
        <div
          class="settings-footer"
          style="display: flex; gap: 8px; justify-content: flex-end"
        >
          <button
            class="settings-save-btn"
            id="settings-reset-btn"
            style="
              background: rgba(255, 255, 255, 0.1);
              border-color: rgba(255, 255, 255, 0.3);
              color: #fff;
            "
          >
            Reset
          </button>
          <button class="settings-save-btn" id="settings-save-btn">
            Save Settings
          </button>
        </div>
        <div class="settings-credits">
          <a href="https://github.com/bariskisir/WorldWeatherMonitor" target="_blank" rel="noopener noreferrer">GitHub Repository</a> • 
          Created by <a href="https://www.bariskisir.com" target="_blank" rel="noopener noreferrer">Barış Kısır</a>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
